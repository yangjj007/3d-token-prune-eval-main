model_backend: shapellm  # 模型后端: ShapeLLM
data_csv: ../data/metadata.csv  # 样本元数据 CSV
glb_dir: ../data  # GLB 网格目录
model_id: ../model/hf-cache/ShapeLLM-7B-omni  # ShapeLLM 权重目录
num_samples: 10  # 评测样本数
output_dir: ../output/shapellm-full  # 结果输出目录
run_log_file: ../output/shapellm-full/eval_run.log  # 运行日志文件
eval_config_dir: configs/eval  # 剪枝器超参目录
pruners:  # 待评测剪枝器列表
  - no_pruning  # 不剪枝基线
  - random  # 随机保留 token
  - uniform  # 均匀间隔保留
  - divprune  # 多样性保留
  - apet  # 近似误差保留
  - otprune  # OT/DPP 选择
  - tome  # 相似 token 合并
  - fastv_mesh  # FastV mesh 变体
  - loco3d  # 3D 空间剪枝
  - octree_merge  # 八叉树块剪枝
  - runlength_curve  # 空间曲线游程剪枝
  - reconot  # 重构误差+OT 剪枝
keep_ratios: [1.0, 0.75, 0.5, 0.25, 0.1]  # token 保留比例
device: cuda  # VLM/主模型设备
vqvae_device: cuda  # VQVAE 设备
vlm_torch_dtype: bfloat16  # VLM 加载精度
seed: 42  # 随机种子
env:  # 运行时环境变量
  KMP_DUPLICATE_LIB_OK: "TRUE"  # 允许 OpenMP 重复加载
  SPCONV_ALGO: native  # spconv 使用 native 算法
  SHAPELLM_EVAL_LIGHT: "1"  # 启用轻量评测模式
  SHAPELLM_ENABLE_SEMANTIC_METRICS: "1"  # 启用语义指标
