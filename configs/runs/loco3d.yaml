model_backend: shapellm  # 模型后端: ShapeLLM
data_csv: ../data/metadata.csv  # 样本元数据 CSV
glb_dir: ../data  # GLB 网格目录
model_id: ../model/hf-cache/ShapeLLM-7B-omni  # ShapeLLM 权重目录
num_samples: -1  # 评测全部样本
output_dir: ../output/eval_results_loco3d  # 结果输出目录
run_log_file: ../output/eval_results_loco3d/eval_run.log  # 运行日志文件
eval_config_dir: configs/eval  # 剪枝器超参目录
pruners:  # 待评测剪枝器列表
  - loco3d  # 3D 空间剪枝
keep_ratios: [0.75, 0.5, 0.25, 0.1]  # token 保留比例
device: cuda:0  # VLM/主模型设备
vqvae_device: cuda:1  # VQVAE 设备
vlm_torch_dtype: bfloat16  # VLM 加载精度
seed: 42  # 随机种子
env:  # 运行时环境变量
  KMP_DUPLICATE_LIB_OK: "TRUE"  # 允许 OpenMP 重复加载
  SPCONV_ALGO: native  # spconv 使用 native 算法
  SHAPELLM_EVAL_LIGHT: "1"  # 启用轻量评测模式
